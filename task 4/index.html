<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 id="heading">Welcome to DOM Practice</h1>

    <p id="paragraph">
        This project demonstrates JavaScript DOM Manipulation.
    </p>

    <div class="buttons">

        <button onclick="changeText()">
            Change Text
        </button>

        <button id="alertBtn">
            Click Event
        </button>

        <button onclick="toggleParagraph()">
            Show / Hide
        </button>

        <button onclick="changeColor()">
            Change Background
        </button>

        <button onclick="resetPage()">
            Reset
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
